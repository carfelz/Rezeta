services:
  postgres:
    image: postgres:16-alpine
    container_name: rezeta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rezeta_dev
      POSTGRES_USER: rezeta
      POSTGRES_PASSWORD: rezeta
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./tools/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rezeta -d rezeta_dev']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
