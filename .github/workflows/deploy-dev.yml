name: Deploy to Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: medical-erp-dev
  REGION: southamerica-east1
  SERVICE_NAME: medical-erp-api
  REPOSITORY: medical-erp

jobs:
  deploy-api:
    runs-on: ubuntu-latest

    # Output the API URL so frontend job can use it
    outputs:
      api_url: ${{ steps.get-url.outputs.url }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:latest \
            -f apps/api/Dockerfile \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --timeout 300 \
            --set-env-vars NODE_ENV=production,PORT=8080 \
            --set-secrets DATABASE_URL=database_url:latest,FIREBASE_ADMIN_KEY=firebase-admin-key:latest

      - name: Get Service URL
        id: get-url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "API deployed at: $URL"

      - name: Run Database Migrations
        run: |
          DATABASE_URL=$(gcloud secrets versions access latest --secret=database_url)
          DIRECT_URL=$(gcloud secrets versions access latest --secret=direct_url)
          export DATABASE_URL DIRECT_URL
          pnpm --filter @rezeta/db exec prisma migrate deploy

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-api # Wait for API to finish

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Create environment file
        run: |
          echo "VITE_API_URL=${{ needs.deploy-api.outputs.api_url }}" > apps/web/.env.production
          cat apps/web/.env.production

      - name: Install dependencies
        run: |
          cd apps/web
          pnpm install --frozen-lockfile

      - name: Build frontend
        run: |
          cd apps/web
          pnpm run build

      - name: Deploy to GCS
        run: |
          # Sync files to GCS bucket
          gsutil -m rsync -r -d apps/web/dist/ gs://${{ env.PROJECT_ID }}-frontend

          # Set cache headers for hashed assets (long cache)
          gsutil -m setmeta -h "Cache-Control:public, max-age=31536000, immutable" \
            'gs://${{ env.PROJECT_ID }}-frontend/assets/**' || true

          # Set cache headers for HTML (no cache)
          gsutil -m setmeta -h "Cache-Control:public, max-age=0, must-revalidate" \
            'gs://${{ env.PROJECT_ID }}-frontend/*.html' || true

      - name: Output Deployment URLs
        run: |
          echo "🚀 Deployment Complete!"
          echo ""
          echo "Frontend: https://storage.googleapis.com/${{ env.PROJECT_ID }}-frontend/index.html"
          echo "API: ${{ needs.deploy-api.outputs.api_url }}"
