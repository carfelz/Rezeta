<!doctype html>
<html lang="es"><head><meta charset="utf-8"/>
<title>Primary</title>
<link rel="stylesheet" href="_base.css"/>
<style>
  body{padding:20px}
  .ramp{display:grid;grid-template-columns:repeat(6,1fr);gap:0;border:var(--border-default);border-radius:var(--radius-md);overflow:hidden;width:100%;max-width:700px}
  .sw{aspect-ratio:1/0.85;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font-family:var(--font-mono);font-size:10px}
  .sw .lbl{font-weight:500}
  .sw .hex{font-size:9.5px;opacity:0.75;letter-spacing:0.02em}
  .sw .anchor{position:absolute;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;margin-top:-14px}
</style></head>
<body>
<div class="ramp">
  <div class="sw" style="background:#EAF0F1;color:#1B3A41"><span class="lbl">p · 50</span><span class="hex">EAF0F1</span></div>
  <div class="sw" style="background:#C9D7DA;color:#0E2429"><span class="lbl">p · 100</span><span class="hex">C9D7DA</span></div>
  <div class="sw" style="background:#6A8B91;color:#FAFAF7"><span class="lbl">p · 300</span><span class="hex">6A8B91</span></div>
  <div class="sw" style="background:#2D5760;color:#FAFAF7;position:relative"><span class="anchor">⬩ brand anchor</span><span class="lbl">p · 500</span><span class="hex">2D5760</span></div>
  <div class="sw" style="background:#1B3A41;color:#FAFAF7"><span class="lbl">p · 700</span><span class="hex">1B3A41</span></div>
  <div class="sw" style="background:#0E2429;color:#FAFAF7"><span class="lbl">p · 900</span><span class="hex">0E2429</span></div>
</div>
</body></html>
