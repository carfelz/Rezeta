<!doctype html>
<html lang="es"><head><meta charset="utf-8"/>
<title>Elevation</title>
<link rel="stylesheet" href="_base.css"/>
<style>
  body{padding:32px;background:var(--color-n-25)}
  .wrap{display:flex;gap:22px;width:100%;max-width:700px;justify-content:center}
  .item{display:flex;flex-direction:column;align-items:center;gap:10px}
  .box{width:160px;height:88px;background:var(--color-n-0);border:1px solid var(--color-n-200);border-radius:5px}
  .raised{box-shadow:0 1px 0 rgba(14,14,13,0.04), 0 1px 2px rgba(14,14,13,0.04)}
  .floating{box-shadow:0 1px 0 rgba(14,14,13,0.04),0 8px 24px -8px rgba(14,14,13,0.12),0 2px 6px rgba(14,14,13,0.06)}
  .meta{font-family:var(--font-mono);font-size:10.5px;color:var(--color-n-500);text-align:center;line-height:1.45}
  .meta b{display:block;color:var(--color-n-800);font-weight:500;font-size:11.5px}
  .meta span{display:block;color:var(--color-n-400);font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;margin-top:1px}
</style></head>
<body>
<div class="wrap">
  <div class="item"><div class="box"></div><div class="meta"><b>flat</b><span>default · static content</span></div></div>
  <div class="item"><div class="box raised"></div><div class="meta"><b>raised</b><span>hover-elevated</span></div></div>
  <div class="item"><div class="box floating"></div><div class="meta"><b>floating</b><span>modals · toasts</span></div></div>
</div>
</body></html>
