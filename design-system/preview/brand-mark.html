<!doctype html>
<html lang="es"><head><meta charset="utf-8"/>
<title>Brand mark</title>
<link rel="stylesheet" href="_base.css"/>
<style>
  body{padding:0;background:var(--color-n-25)}
  .wrap{display:flex;align-items:center;gap:32px;padding:28px 32px;width:100%;max-width:700px}
  .mark{width:64px;height:64px;border-radius:5px;background:var(--color-p-500);display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-weight:500;color:#fff;font-size:36px;flex-shrink:0}
  .wordmark{font-family:var(--font-serif);font-weight:500;font-size:42px;letter-spacing:-0.02em;color:var(--color-n-900);line-height:1}
  .meta{margin-top:6px;font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--color-n-400)}
</style></head>
<body>
<div class="wrap">
  <div class="mark">R</div>
  <div>
    <div class="wordmark">Rezeta</div>
    <div class="meta">Medical ERP · Dominican Republic</div>
  </div>
</div>
</body></html>
