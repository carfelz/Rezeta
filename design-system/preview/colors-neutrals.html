<!doctype html>
<html lang="es"><head><meta charset="utf-8"/>
<title>Neutrals</title>
<link rel="stylesheet" href="_base.css"/>
<style>
  body{padding:20px}
  .ramp{display:grid;grid-template-columns:repeat(12,1fr);gap:0;border:var(--border-default);border-radius:var(--radius-md);overflow:hidden;width:100%;max-width:700px}
  .sw{aspect-ratio:1/1.4;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font-family:var(--font-mono);font-size:9.5px;color:var(--color-n-700)}
  .sw .lbl{font-weight:500;color:inherit}
  .sw .hex{font-size:9px;opacity:0.7;letter-spacing:0.02em}
  .sw.light{color:var(--color-n-700)}
  .sw.dark{color:var(--color-n-25)}
</style></head>
<body>
<div class="ramp">
  <div class="sw light" style="background:#FFFFFF"><span class="lbl">0</span><span class="hex">FFFFFF</span></div>
  <div class="sw light" style="background:#FAFAF7"><span class="lbl">25</span><span class="hex">FAFAF7</span></div>
  <div class="sw light" style="background:#F4F4F0"><span class="lbl">50</span><span class="hex">F4F4F0</span></div>
  <div class="sw light" style="background:#EBEBE6"><span class="lbl">100</span><span class="hex">EBEBE6</span></div>
  <div class="sw light" style="background:#D8D8D2"><span class="lbl">200</span><span class="hex">D8D8D2</span></div>
  <div class="sw light" style="background:#B9B9B3"><span class="lbl">300</span><span class="hex">B9B9B3</span></div>
  <div class="sw dark" style="background:#8E8E88"><span class="lbl">400</span><span class="hex">8E8E88</span></div>
  <div class="sw dark" style="background:#6B6B66"><span class="lbl">500</span><span class="hex">6B6B66</span></div>
  <div class="sw dark" style="background:#4A4A46"><span class="lbl">600</span><span class="hex">4A4A46</span></div>
  <div class="sw dark" style="background:#2E2E2B"><span class="lbl">700</span><span class="hex">2E2E2B</span></div>
  <div class="sw dark" style="background:#1C1C1A"><span class="lbl">800</span><span class="hex">1C1C1A</span></div>
  <div class="sw dark" style="background:#0E0E0D"><span class="lbl">900</span><span class="hex">0E0E0D</span></div>
</div>
</body></html>
