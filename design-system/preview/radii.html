<!doctype html>
<html lang="es"><head><meta charset="utf-8"/>
<title>Radii</title>
<link rel="stylesheet" href="_base.css"/>
<style>
  body{padding:32px;background:var(--color-n-25)}
  .wrap{display:flex;gap:24px;width:100%;max-width:700px;justify-content:center}
  .item{display:flex;flex-direction:column;align-items:center;gap:10px}
  .box{width:120px;height:80px;background:var(--color-n-0);border:1px solid var(--color-n-200)}
  .meta{font-family:var(--font-mono);font-size:10.5px;color:var(--color-n-500);text-align:center;line-height:1.45}
  .meta b{display:block;color:var(--color-n-800);font-weight:500;font-size:11.5px}
  .meta span{display:block;color:var(--color-n-400);font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;margin-top:1px}
</style></head>
<body>
<div class="wrap">
  <div class="item"><div class="box" style="border-radius:3px"></div><div class="meta"><b>3 px · sm</b><span>buttons · inputs · chips</span></div></div>
  <div class="item"><div class="box" style="border-radius:5px"></div><div class="meta"><b>5 px · md</b><span>cards · modals · callouts</span></div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="meta"><b>8 px · lg</b><span>large containers</span></div></div>
</div>
</body></html>
