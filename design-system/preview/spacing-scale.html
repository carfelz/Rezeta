<!doctype html>
<html lang="es"><head><meta charset="utf-8"/>
<title>Spacing scale</title>
<link rel="stylesheet" href="_base.css"/>
<style>
  body{padding:24px;background:var(--color-n-25)}
  .wrap{width:100%;max-width:700px;display:grid;grid-template-columns:repeat(10,1fr);gap:10px;align-items:end}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--color-p-500);width:100%;border-radius:1px}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--color-n-500);text-align:center;line-height:1.3}
  .meta b{display:block;color:var(--color-n-800);font-weight:500}
</style></head>
<body>
<div class="wrap">
  <div class="col"><div class="bar" style="height:4px"></div><div class="meta"><b>1</b>4px</div></div>
  <div class="col"><div class="bar" style="height:8px"></div><div class="meta"><b>2</b>8px</div></div>
  <div class="col"><div class="bar" style="height:12px"></div><div class="meta"><b>3</b>12px</div></div>
  <div class="col"><div class="bar" style="height:16px"></div><div class="meta"><b>4</b>16px</div></div>
  <div class="col"><div class="bar" style="height:20px"></div><div class="meta"><b>5</b>20px</div></div>
  <div class="col"><div class="bar" style="height:24px"></div><div class="meta"><b>6</b>24px</div></div>
  <div class="col"><div class="bar" style="height:32px"></div><div class="meta"><b>8</b>32px</div></div>
  <div class="col"><div class="bar" style="height:40px"></div><div class="meta"><b>10</b>40px</div></div>
  <div class="col"><div class="bar" style="height:48px"></div><div class="meta"><b>12</b>48px</div></div>
  <div class="col"><div class="bar" style="height:64px"></div><div class="meta"><b>16</b>64px</div></div>
</div>
</body></html>
