<!doctype html>
<html lang="es"><head><meta charset="utf-8"/>
<title>Buttons</title>
<link rel="stylesheet" href="_base.css"/>
<link rel="stylesheet" href="../shadcn-tokens.css"/>
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<style>
  body{padding:20px;justify-content:flex-start;align-items:flex-start}
  .wrap{display:flex;flex-direction:column;gap:14px;width:100%;max-width:700px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--color-n-400);min-width:88px}
  .btn{font-family:var(--font-sans);font-weight:500;font-size:13px;border-radius:3px;display:inline-flex;align-items:center;gap:8px;border:1px solid transparent;padding:0 14px;height:32px;cursor:pointer}
  .btn i{font-size:15px}
  .btn-primary{background:var(--color-p-500);color:#fff}
  .btn-secondary{background:#fff;color:var(--color-n-800);border-color:var(--color-n-300)}
  .btn-ghost{background:transparent;color:var(--color-n-700)}
  .btn-danger{background:#8C2A20;color:#fff}
  .btn-outline{background:transparent;color:var(--color-n-700);border-color:var(--color-n-200)}
  .btn-link{background:transparent;color:var(--color-p-500);text-decoration:underline;text-underline-offset:3px;padding:0 4px}
  .btn.sm{height:28px;font-size:12.5px;padding:0 10px}
  .btn.lg{height:40px;font-size:14px;padding:0 18px}
  .btn.icon{padding:0;width:32px}
</style></head>
<body><div class="wrap">
  <div class="row"><span class="lbl">Variants</span>
    <button class="btn btn-primary"><i class="ph ph-signature"></i>Firmar</button>
    <button class="btn btn-secondary">Guardar borrador</button>
    <button class="btn btn-ghost">Cancelar</button>
    <button class="btn btn-danger">Eliminar</button>
  </div>
  <div class="row"><span class="lbl">Outline · Link</span>
    <button class="btn btn-outline"><i class="ph ph-plus"></i>Agregar bloque</button>
    <button class="btn btn-link">Ver historial</button>
    <button class="btn btn-secondary icon"><i class="ph ph-dots-three"></i></button>
  </div>
  <div class="row"><span class="lbl">Sizes</span>
    <button class="btn btn-primary sm">Small</button>
    <button class="btn btn-primary">Default · 32px</button>
    <button class="btn btn-primary lg">Large · 40px</button>
  </div>
</div></body></html>
