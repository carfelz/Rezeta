<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Flow F · Puerta de inicio — click-through</title>
<link rel="stylesheet" href="rezeta-tokens.css"/>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
<style>
  html, body { height: 100%; margin: 0; background: #0E0E0D; }
  *, *::before, *::after { box-sizing: border-box; }

  .frame { width: 100%; height: 100%; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="deck-stage.js"></script>
</head>
<body>

</deck-stage>

<script type="text/babel" src="consultation-shell.jsx"></script>
<script type="text/babel" src="flow-f.jsx"></script>

<script type="text/babel">
for (let i = 1; i <= 6; i++) {
  const root = ReactDOM.createRoot(document.getElementById('frame-' + i));
  root.render(<FlowFFrame n={i}/>);
}
</script>
